name: Daily Macro & Ledger Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC daily
  workflow_dispatch:    # Allows you to click "Run" manually whenever you want

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Kinetic Ledger Script
        run: python update_ledger.py

      # This keeps your oil macro ledger current as well
      - name: Run Market Macro Sync
        run: |
          node -e "
            // ... (Your previous node oil-price logic goes here) ...
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Macro-Monitor-Bot"
          git config --global user.email "bot@tracker.local"
          git add public/data/
          git diff-index --quiet HEAD || (git commit -m "Automated Sync: Updated kinetic ledger and oil premium" && git push)
