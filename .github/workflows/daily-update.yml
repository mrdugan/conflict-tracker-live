name: Daily Macro & Ledger Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Kinetic Ledger Script
        run: python update_ledger.py

      - name: Run Market Macro Sync
        run: |
          node -e "
            const fs = require('fs');
            async function update() {
              try {
                const response = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/BZ=F');
                const data = await response.json();
                const price = data.chart.result[0].meta.regularMarketPrice;
                const premium = Math.max(0, price - 68.00);
                const dailyCost = premium * 20600000;
                
                const path = 'public/data/macro-ledger.json';
                let ledger = [];
                if (fs.existsSync(path)) ledger = JSON.parse(fs.readFileSync(path));
                
                ledger.push({
                  date: new Date().toISOString().split('T')[0],
                  closingOilPrice: price,
                  dailyAccumulatedCost: dailyCost
                });
                
                fs.writeFileSync(path, JSON.stringify(ledger, null, 2));
              } catch (e) { console.error(e); process.exit(1); }
            }
            update();
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Macro-Monitor-Bot"
          git config --global user.email "bot@tracker.local"
          git add public/data/
          git diff-index --quiet HEAD || (git commit -m "Automated Sync: Updated kinetic ledger and oil premium" && git push)
